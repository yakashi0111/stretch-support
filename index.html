<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Drum Picker Timer</title>
    <style>
        :root {
            --primary-color: #2ecc71;
            --stop-color: #e74c3c;
            --bg-color: #000000;
            --text-color: #ffffff;
            --accent-color: #3498db;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 巨大タイマーエリア（元のデザインを復元） */
        .timer-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 85vw;
            height: 85vw;
            max-width: 550px;
            max-height: 550px;
        }

        .timer-svg {
            position: absolute;
            transform: rotate(-90deg);
            width: 100%;
            height: 100%;
        }

        .timer-bg { fill: none; stroke: #222; stroke-width: 4; }
        .timer-bar {
            fill: none;
            stroke: var(--primary-color);
            stroke-width: 6;
            stroke-linecap: round;
        }

        .inner-ui {
            z-index: 10;
            text-align: center;
            width: 85%;
        }

        #current-title {
            font-size: clamp(1.2rem, 5vw, 2.2rem);
            margin-bottom: 5px;
            color: #aaa;
            font-weight: 300;
        }

        #time-display {
            font-size: clamp(4.5rem, 18vw, 9rem);
            font-weight: 100;
            font-variant-numeric: tabular-nums;
            margin-bottom: 20px;
        }

        #main-btn {
            padding: 15px 45px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            transition: 0.3s;
            width: 160px;
        }
        .btn-start { background: var(--primary-color); }
        .btn-stop { background: var(--stop-color); }

        /* 設定ボタン（中央の歯車アイコン） */
        .settings-trigger {
            margin-top: 30px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 10px;
        }
        .settings-trigger svg { fill: #444; width: 36px; height: 36px; }

        /* 設定パネル */
        .settings-panel {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98);
            z-index: 100;
            overflow-y: auto;
            padding: 40px 20px;
            box-sizing: border-box;
        }
        .settings-panel.open { display: block; }
        .settings-content { max-width: 450px; margin: 0 auto; }

        /* iPhone風ドラムピッカー（1秒刻み） */
        .picker-container {
            position: relative; height: 150px; width: 120px; margin: 20px auto;
            overflow-y: scroll; scroll-snap-type: y mandatory;
            scrollbar-width: none;
            mask-image: linear-gradient(0deg, transparent, black 40%, black 60%, transparent);
            -webkit-mask-image: linear-gradient(0deg, transparent, black 40%, black 60%, transparent);
        }
        .picker-container::-webkit-scrollbar { display: none; }
        .picker-list { padding: 50px 0; }
        .picker-item {
            height: 50px; display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; font-weight: bold; scroll-snap-align: center; color: #444;
        }
        .picker-item.selected { color: var(--accent-color); font-size: 2.2rem; }
        .picker-highlight {
            position: absolute; top: 50px; left: 0; right: 0; height: 50px;
            border-top: 1px solid #333; border-bottom: 1px solid #333; pointer-events: none;
        }

        .input-group { display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px; }
        input, select {
            background: #111; border: 1px solid #333; color: white;
            padding: 15px; border-radius: 8px; font-size: 1rem;
        }

        /* リスト表示 */
        .list-item {
            display: flex; align-items: center;
            background: #111; margin-bottom: 10px;
            padding: 15px; border-radius: 8px;
            cursor: grab;
        }
        .list-item.dragging { opacity: 0.5; }
        .handle { color: #444; margin-right: 15px; font-size: 1.2rem; }
        .item-info { flex-grow: 1; }
        .remove-btn { color: var(--stop-color); border: none; background: none; font-size: 1.5rem; cursor: pointer; }

        .close-settings {
            width: 100%; padding: 15px; margin-top: 30px;
            background: #222; color: white; border: none; border-radius: 8px; font-weight: bold;
        }
    </style>
</head>
<body>

<div class="timer-container">
    <svg class="timer-svg" viewBox="0 0 400 400">
        <circle class="timer-bg" cx="200" cy="200" r="190"></circle>
        <circle id="progress-bar" class="timer-bar" cx="200" cy="200" r="190"></circle>
    </svg>
    <div class="inner-ui">
        <h1 id="current-title">Ready</h1>
        <div id="time-display">0.0</div>
        <button id="main-btn" class="btn-start">START</button>
    </div>
</div>

<button class="settings-trigger" id="open-settings">
    <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
</button>

<div class="settings-panel" id="panel">
    <div class="settings-content">
        <h2>メニュー編集</h2>
        <div class="picker-container" id="picker">
            <div class="picker-highlight"></div>
            <div class="picker-list" id="picker-list"></div>
        </div>
        <div class="input-group">
            <input type="text" id="new-name" placeholder="項目名を入力">
            <select id="side-type">
                <option value="both">両方同時（1セット）</option>
                <option value="single">左右交互（2セット）</option>
            </select>
            <button id="add-btn" style="background: var(--accent-color); color: white; padding: 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">リストに追加</button>
        </div>
        <div id="item-list"></div>
        <button class="close-settings" id="close-settings">閉じる</button>
    </div>
</div>

<script>
    let rawStretches = [{ name: "ハム", time: 40, type: "both" }];
    let workoutQueue = [], currentIndex = 0, selectedSeconds = 30;
    let startTime, elapsedTime = 0, requestID, isRunning = false;

    const circle = document.getElementById('progress-bar');
    const radius = circle.r.baseVal.value;
    const circumference = 2 * Math.PI * radius;
    circle.style.strokeDasharray = `${circumference} ${circumference}`;

    // ドラムピッカー生成 (1秒刻み, 5〜180秒)
    const picker = document.getElementById('picker');
    const pickerList = document.getElementById('picker-list');
    for (let i = 1; i <= 180; i++) {
        const item = document.createElement('div');
        item.className = 'picker-item';
        item.innerText = i;
        item.dataset.sec = i;
        pickerList.appendChild(item);
    }

    picker.addEventListener('scroll', () => {
        const items = document.querySelectorAll('.picker-item');
        let closest = null;
        let minDiff = Infinity;
        items.forEach(item => {
            const rect = item.getBoundingClientRect();
            const centerDiff = Math.abs(rect.top + rect.height/2 - (picker.getBoundingClientRect().top + picker.clientHeight/2));
            item.classList.remove('selected');
            if (centerDiff < minDiff) { minDiff = centerDiff; closest = item; }
        });
        if (closest) {
            closest.classList.add('selected');
            selectedSeconds = parseInt(closest.dataset.sec);
        }
    });

    setTimeout(() => picker.scrollTop = (30 - 5) * 50, 100);

    function buildQueue() {
        workoutQueue = [];
        rawStretches.forEach(s => {
            if (s.type === "single") {
                workoutQueue.push({ ...s, name: s.name + " (左)" });
                workoutQueue.push({ ...s, name: s.name + " (右)" });
            } else { workoutQueue.push(s); }
        });
    }

    function updateUI() {
        if (workoutQueue.length === 0) { document.getElementById('current-title').innerText = "メニューなし"; return; }
        const current = workoutQueue[currentIndex];
        document.getElementById('current-title').innerText = current.name;
        document.getElementById('time-display').innerText = current.time.toFixed(1);
        circle.style.strokeDashoffset = 0;
    }

    function animate() {
        const currentTotal = workoutQueue[currentIndex].time * 1000;
        const now = performance.now();
        const delta = now - startTime + elapsedTime;
        const remaining = Math.max(0, currentTotal - delta);
        document.getElementById('time-display').innerText = (remaining / 1000).toFixed(1);
        circle.style.strokeDashoffset = circumference - ((remaining / currentTotal) * circumference);
        if (remaining > 0) { requestID = requestAnimationFrame(animate); } 
        else {
            cancelAnimationFrame(requestID);
            isRunning = false; 
            elapsedTime = 0;
            const btn = document.getElementById('main-btn');
            btn.innerText = "START";
            btn.className = "btn-start";

            currentIndex++;

            if (currentIndex < workoutQueue.length) {
                updateUI();
                setTimeout(() => {
                    if (!isRunning) {
                        isRunning = true;
                        btn.innerText = "STOP";
                        btn.className = "btn-stop";
                        startTime = performance.now();
                        requestID = requestAnimationFrame(animate);
                    }
                }, 5000); 
            } else {
                currentIndex = 0;
                updateUI();
                alert("All Done!");
            }
        }
    }

    function toggleTimer() {
        const btn = document.getElementById('main-btn');
        if (!isRunning) {
            if (workoutQueue.length === 0) return;
            isRunning = true; btn.innerText = "STOP"; btn.className = "btn-stop";
            startTime = performance.now(); requestID = requestAnimationFrame(animate);
        } else {
            isRunning = false; btn.innerText = "START"; btn.className = "btn-start";
            cancelAnimationFrame(requestID); elapsedTime += performance.now() - startTime;
        }
    }

    function renderList() {
        const listDiv = document.getElementById('item-list');
        listDiv.innerHTML = '';
        rawStretches.forEach((s, i) => {
            const item = document.createElement('div');
            item.className = 'list-item'; item.draggable = true; item.dataset.index = i;
            item.innerHTML = `<div class="handle">≡</div><div class="item-info"><strong>${s.name}</strong> (${s.time}s)</div><button class="remove-btn" onclick="removeItem(${i})">✕</button>`;
            item.addEventListener('dragstart', () => item.classList.add('dragging'));
            item.addEventListener('dragend', () => { item.classList.remove('dragging'); saveNewOrder(); });
            listDiv.appendChild(item);
        });
        listDiv.addEventListener('dragover', e => {
            e.preventDefault();
            const draggingItem = document.querySelector('.dragging');
            const siblings = [...listDiv.querySelectorAll('.list-item:not(.dragging)')];
            let nextSibling = siblings.find(sibling => e.clientY <= sibling.offsetTop + sibling.offsetHeight / 2);
            listDiv.insertBefore(draggingItem, nextSibling);
        });
        buildQueue(); updateUI();
    }

    function saveNewOrder() {
        const newList = [];
        document.querySelectorAll('.list-item').forEach(item => newList.push(rawStretches[item.dataset.index]));
        rawStretches = newList; renderList();
    }

    function removeItem(i) { rawStretches.splice(i, 1); renderList(); }

    document.getElementById('add-btn').addEventListener('click', () => {
        const nameInput = document.getElementById('new-name');
        if (nameInput.value) {
            rawStretches.push({ name: nameInput.value, time: selectedSeconds, type: document.getElementById('side-type').value });
            nameInput.value = ''; renderList();
        }
    });

    document.getElementById('open-settings').onclick = () => document.getElementById('panel').classList.add('open');
    document.getElementById('close-settings').onclick = () => document.getElementById('panel').classList.remove('open');
    document.getElementById('main-btn').onclick = toggleTimer;

    renderList();
</script>
</body>
</html>
