<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stretch Tool</title>
    <style>
        :root {
            --primary-color: #2ecc71;
            --stop-color: #e74c3c;
            --bg-color: #000000;
            --text-color: #ffffff;
            --accent-color: #3498db;
            --wait-color: #f1c40f;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .timer-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 85vw;
            height: 85vw;
            max-width: 500px;
            max-height: 500px;
        }

        .timer-svg {
            position: absolute;
            transform: rotate(-90deg);
            width: 100%;
            height: 100%;
        }

        .timer-bg { fill: none; stroke: #222; stroke-width: 4; }
        .timer-bar {
            fill: none;
            stroke: var(--primary-color);
            stroke-width: 6;
            stroke-linecap: round;
        }

        .inner-ui {
            z-index: 10;
            text-align: center;
            width: 85%;
        }

        #current-title {
            font-size: clamp(1.2rem, 5vw, 2.2rem);
            margin-bottom: 5px;
            color: #aaa;
            font-weight: 300;
            height: 1.2em;
        }

        #time-display {
            font-size: clamp(4.5rem, 18vw, 9rem);
            font-weight: 100;
            margin-bottom: 20px;
            font-variant-numeric: tabular-nums;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        #main-btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            width: 140px;
        }

        #prev-btn {
            background: #333;
            padding: 15px 25px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            color: white;
        }

        .btn-start { background: var(--primary-color); }
        .btn-stop { background: var(--stop-color); }

        .settings-trigger {
            margin-top: 30px;
            background: none; border: none; cursor: pointer;
        }
        .settings-trigger svg { fill: #444; width: 36px; height: 36px; }

        .settings-panel {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98);
            z-index: 100;
            overflow-y: auto;
            padding: 20px;
            box-sizing: border-box;
        }
        .settings-panel.open { display: block; }

        .wait-setting {
            text-align: center; 
            margin-bottom: 20px; 
            border-bottom: 1px solid #333; 
            padding-bottom: 20px;
        }

        .wait-setting .label {
            color: #666;
            font-size: 0.8rem;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .slider-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .picker-container {
            position: relative; height: 150px; width: 100px; margin: 10px auto;
            overflow-y: scroll; scroll-snap-type: y mandatory;
            mask-image: linear-gradient(0deg, transparent, black 40%, black 60%, transparent);
            -webkit-mask-image: linear-gradient(0deg, transparent, black 40%, black 60%, transparent);
        }
        .picker-container::-webkit-scrollbar { display: none; }
        .picker-list { padding: 50px 0; }
        .picker-item {
            height: 50px; display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; scroll-snap-align: center; color: #444;
        }
        .picker-item.selected { color: var(--accent-color); font-size: 2.2rem; font-weight: bold; }

        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; max-width: 400px; margin: 0 auto 20px auto;}
        input:not([type="range"]), select {
            background: #111; border: 1px solid #333; color: white; padding: 12px; border-radius: 8px; font-size: 1rem;
        }

        .list-item {
            display: flex; align-items: center; background: #111; margin-bottom: 8px;
            padding: 12px; border-radius: 8px; cursor: grab; max-width: 400px; margin: 0 auto 8px auto;
        }
        .item-info { flex-grow: 1; margin-left: 10px; }
        .remove-btn { color: var(--stop-color); border: none; background: none; font-size: 1.2rem; cursor: pointer; }

        /* スライダー（バー）の見た目 */
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 200px;
            height: 4px;
            background: transparent;
            outline: none;
        }

        /* Chrome/Safari用：バー本体のスタイル */
        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            background: #333;
            border-radius: 2px;
        }

        /* つまみ（丸い部分）のデザイン - Chrome/Safari */
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: var(--primary-color);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(46, 204, 113, 0.4);
            transition: transform 0.1s;
            margin-top: -8px;
        }

        input[type="range"]::-webkit-slider-thumb:active {
            transform: scale(1.3);
        }

        /* Firefox用：バー本体のスタイル */
        input[type="range"]::-moz-range-track {
            width: 100%;
            height: 4px;
            background: #333;
            border-radius: 2px;
        }

        /* つまみ（丸い部分）のデザイン - Firefox */
        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            background: var(--primary-color);
            border-radius: 50%;
            cursor: pointer;
            border: none;
            box-shadow: 0 0 10px rgba(46, 204, 113, 0.4);
            transition: transform 0.1s;
        }

        input[type="range"]::-moz-range-thumb:active {
            transform: scale(1.3);
        }

        /* 数字の表示スタイル */
        .value-display {
            min-width: 60px;
            text-align: left;
        }

        #wait-val-display {
            font-size: 2.5rem;
            font-weight: 200;
            color: var(--primary-color);
        }

        .value-display .unit {
            color: #666;
            font-size: 1rem;
            margin-left: 5px;
        }
    </style>
</head>
<body>

<div class="timer-container">
    <svg class="timer-svg" viewBox="0 0 400 400">
        <circle class="timer-bg" cx="200" cy="200" r="190"></circle>
        <circle id="progress-bar" class="timer-bar" cx="200" cy="200" r="190"></circle>
    </svg>
    <div class="inner-ui">
        <h1 id="current-title">Ready</h1>
        <div id="time-display">0.0</div>
        <div class="controls">
            <button id="prev-btn">PREV</button>
            <button id="main-btn" class="btn-start">START</button>
        </div>
    </div>
</div>

<button class="settings-trigger" id="open-settings">
    <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
</button>

<div class="settings-panel" id="panel">
    <div style="max-width: 450px; margin: 0 auto;">
        <h2 style="text-align:center;">MENU</h2>
        
        <div class="wait-setting">
            <p class="label">INTERVAL TIME</p>
            <div class="slider-wrapper">
                <input type="range" id="wait-sec-input" min="0" max="30" value="5">
                <div class="value-display">
                    <span id="wait-val-display">5</span><span class="unit">s</span>
                </div>
            </div>
        </div>

        <div style="text-align: center; margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 30px;">
            <p style="color: #666; font-size: 0.8rem; margin-bottom: 20px; letter-spacing: 2px;">DURATION</p>
            <div class="picker-container" id="picker">
                <div class="picker-list" id="picker-list"></div>
            </div>
        </div>

        <div style="text-align: center; margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 30px;">
            <p style="color: #666; font-size: 0.8rem; margin-bottom: 20px; letter-spacing: 2px;">ADD STRETCH</p>
            <div class="input-group">
                <input type="text" id="new-name" placeholder="種目名">
                <select id="side-type">
                    <option value="both">1セット (両方)</option>
                    <option value="single">2セット (左右交互)</option>
                </select>
                <button id="add-btn" style="background: var(--accent-color); color: white; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">追加</button>
            </div>
        </div>
        <div id="item-list"></div>
        <button id="close-settings" style="width: 100%; padding: 15px; margin-top: 20px; background: #333; color: white; border: none; border-radius: 8px; cursor: pointer;">閉じる</button>
    </div>
</div>

<script>
    // --- 状態管理 ---
    let rawStretches = JSON.parse(localStorage.getItem('stretch_data')) || [{ name: "ハム", time: 30, type: "both" }];
    let waitTime = parseInt(localStorage.getItem('wait_time')) || 5;
    let workoutQueue = [];
    let currentIndex = 0;
    let selectedSeconds = 30;
    let isRunning = false;
    let isWaiting = false; 
    let startTime, elapsedTime = 0, requestID;

    const circle = document.getElementById('progress-bar');
    const radius = circle ? circle.r.baseVal.value : 0;
    const circumference = 2 * Math.PI * radius;
    if (circle) circle.style.strokeDasharray = `${circumference} ${circumference}`;

    // --- 初期化処理 (画面が完全に読み込まれてから実行) ---
    window.onload = () => {
        // 1. ピッカー初期化
        const picker = document.getElementById('picker');
        const pickerList = document.getElementById('picker-list');
        if (pickerList) {
            for (let i = 1; i <= 300; i++) {
                const item = document.createElement('div');
                item.className = 'picker-item';
                item.innerText = i;
                item.dataset.sec = i;
                pickerList.appendChild(item);
            }
        }
        if (picker) {
            picker.onscroll = () => {
                const items = document.querySelectorAll('.picker-item');
                const center = picker.getBoundingClientRect().top + picker.clientHeight / 2;
                items.forEach(item => {
                    const itemCenter = item.getBoundingClientRect().top + item.clientHeight / 2;
                    if (Math.abs(center - itemCenter) < 25) {
                        items.forEach(i => i.classList.remove('selected'));
                        item.classList.add('selected');
                        selectedSeconds = parseInt(item.dataset.sec);
                    }
                });
            };
            setTimeout(() => picker.scrollTop = (30 - 1) * 50, 100);
        }

        // 2. スライダーと表示の連動
        const waitInput = document.getElementById('wait-sec-input');
        const waitDisplay = document.getElementById('wait-val-display');
        if (waitInput && waitDisplay) {
            waitInput.oninput = (e) => {
                const val = e.target.value;
                waitDisplay.innerText = val;
                waitTime = parseInt(val) || 0;
                localStorage.setItem('wait_time', waitTime);
            };
            waitInput.value = waitTime;
            waitDisplay.innerText = waitTime;
        }

        // 3. 各種ボタンのイベント登録
        const setClick = (id, fn) => {
            const el = document.getElementById(id);
            if (el) el.onclick = fn;
        };

        setClick('open-settings', () => document.getElementById('panel').classList.add('open'));
        setClick('close-settings', () => document.getElementById('panel').classList.remove('open'));
        setClick('main-btn', toggleTimer);
        setClick('prev-btn', prevStep);
        setClick('add-btn', () => {
            const nameInput = document.getElementById('new-name');
            if (nameInput && nameInput.value) {
                rawStretches.push({ name: nameInput.value, time: selectedSeconds, type: document.getElementById('side-type').value });
                nameInput.value = ''; renderList();
            }
        });

        // 4. エンターキー対応
        const newNameInput = document.getElementById('new-name');
        if (newNameInput) {
            newNameInput.onkeypress = (e) => { if (e.key === 'Enter') document.getElementById('add-btn').click(); };
        }

        renderList();
    };

    // --- タイマー・リスト関連の関数 ---
    function buildQueue() {
        workoutQueue = [];
        rawStretches.forEach(s => {
            if (s.type === "single") {
                workoutQueue.push({ name: s.name + " (左)", time: s.time });
                workoutQueue.push({ name: s.name + " (右)", time: s.time });
            } else {
                workoutQueue.push({ name: s.name, time: s.time });
            }
        });
    }

    function updateUI() {
        if (workoutQueue.length === 0) return;
        const current = workoutQueue[currentIndex];
        const titleEl = document.getElementById('current-title');
        const timeEl = document.getElementById('time-display');
        if (titleEl) titleEl.innerText = isWaiting ? "NEXT: " + current.name : current.name;
        if (circle) circle.style.stroke = isWaiting ? "var(--wait-color)" : "var(--primary-color)";
        
        const total = isWaiting ? waitTime * 1000 : current.time * 1000;
        const displayTime = Math.max(0, (total - elapsedTime) / 1000);
        if (timeEl) timeEl.innerText = displayTime.toFixed(1);
        if (circle) circle.style.strokeDashoffset = circumference - ((displayTime * 1000 / total) * circumference);
    }

    function animate(timestamp) {
        if (!startTime) startTime = timestamp;
        const currentDelta = timestamp - startTime + elapsedTime;
        const totalLimit = (isWaiting ? waitTime : workoutQueue[currentIndex].time) * 1000;
        const remaining = Math.max(0, totalLimit - currentDelta);
        
        const timeEl = document.getElementById('time-display');
        if (timeEl) timeEl.innerText = (remaining / 1000).toFixed(1);
        if (circle) circle.style.strokeDashoffset = circumference - ((remaining / totalLimit) * circumference);

        if (remaining > 0) {
            requestID = requestAnimationFrame(animate);
        } else {
            if (isWaiting) { isWaiting = false; startStep(); } else { nextStep(); }
        }
    }

    function startStep() {
        cancelAnimationFrame(requestID);
        elapsedTime = 0; startTime = null;
        updateUI();
        if (isRunning) requestID = requestAnimationFrame(animate);
    }

    function nextStep() {
        cancelAnimationFrame(requestID);
        elapsedTime = 0; startTime = null;
        
        // 音声通知とバイブレーション
        playNotification();
        
        currentIndex++;
        if (currentIndex < workoutQueue.length) { isWaiting = waitTime > 0; startStep(); } else { finishWorkout(); }
    }

    function prevStep() {
        cancelAnimationFrame(requestID);
        elapsedTime = 0; startTime = null;
        isWaiting = false;
        if (currentIndex > 0) currentIndex--;
        updateUI();
        if (isRunning) requestID = requestAnimationFrame(animate);
    }

    function finishWorkout() {
        isRunning = false; isWaiting = false; currentIndex = 0;
        const btn = document.getElementById('main-btn');
        if (btn) { btn.innerText = "START"; btn.className = "btn-start"; }
        const titleEl = document.getElementById('current-title');
        if (titleEl) titleEl.innerText = "FINISH!";
        if (circle) { circle.style.strokeDashoffset = 0; circle.style.stroke = "var(--primary-color)"; }
        
        // 完了時の音声とバイブレーション
        playNotification();
    }

    function toggleTimer() {
        const btn = document.getElementById('main-btn');
        if (!isRunning) {
            isRunning = true;
            if (btn) { btn.innerText = "STOP"; btn.className = "btn-stop"; }
            startTime = null;
            requestID = requestAnimationFrame(animate);
        } else {
            isRunning = false;
            if (btn) { btn.innerText = "START"; btn.className = "btn-start"; }
            cancelAnimationFrame(requestID);
            elapsedTime += (performance.now() - (startTime || performance.now()));
            startTime = null;
        }
    }

    function renderList() {
        const listDiv = document.getElementById('item-list');
        if (!listDiv) return;
        listDiv.innerHTML = '';
        rawStretches.forEach((s, i) => {
            const item = document.createElement('div');
            item.className = 'list-item';
            item.draggable = true;
            item.innerHTML = `<div class="handle">≡</div><div class="item-info"><strong>${s.name}</strong> (${s.time}秒)</div><button class="remove-btn">✕</button>`;
            item.querySelector('.remove-btn').onclick = () => { rawStretches.splice(i, 1); renderList(); };
            
            // ドラッグ&ドロップイベント
            item.ondragstart = (e) => {
                e.dataTransfer.effectAllowed = 'move';
                e.dataTransfer.setData('text/html', i);
                item.style.opacity = '0.4';
            };
            item.ondragend = () => { item.style.opacity = '1'; };
            item.ondragover = (e) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
                item.style.borderTop = '2px solid var(--primary-color)';
            };
            item.ondragleave = () => { item.style.borderTop = 'none'; };
            item.ondrop = (e) => {
                e.preventDefault();
                item.style.borderTop = 'none';
                const fromIndex = parseInt(e.dataTransfer.getData('text/html'));
                const toIndex = i;
                if (fromIndex !== toIndex) {
                    const [moved] = rawStretches.splice(fromIndex, 1);
                    rawStretches.splice(toIndex, 0, moved);
                    renderList();
                }
            };
            
            listDiv.appendChild(item);
        });
        localStorage.setItem('stretch_data', JSON.stringify(rawStretches));
        buildQueue();
        if (!isRunning) updateUI();
    }

    // 音声通知とバイブレーション
    function playNotification() {
        // バイブレーション（200ms × 2回）
        if ('vibrate' in navigator) {
            navigator.vibrate([200, 100, 200]);
        }
        
        // ビープ音（Web Audio API）
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.frequency.value = 800; // 周波数
            oscillator.type = 'sine';
            
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            
            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + 0.2);
        } catch (e) {
            console.log('Audio notification not supported');
        }
    }
</script>
</body>
</html>
