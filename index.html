<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stretch Tool</title>
    <style>
        :root {
            --primary-color: #2ecc71;
            --stop-color: #e74c3c;
            --bg-color: #000000;
            --text-color: #ffffff;
            --accent-color: #3498db;
            --wait-color: #f1c40f;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .timer-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 85vw;
            height: 85vw;
            max-width: 500px;
            max-height: 500px;
        }

        .timer-svg {
            position: absolute;
            transform: rotate(-90deg);
            width: 100%;
            height: 100%;
        }

        .timer-bg { fill: none; stroke: #222; stroke-width: 4; }
        .timer-bar {
            fill: none;
            stroke: var(--primary-color);
            stroke-width: 6;
            stroke-linecap: round;
        }

        .inner-ui {
            z-index: 10;
            text-align: center;
            width: 85%;
        }

        #current-title {
            font-size: clamp(1.2rem, 5vw, 2.2rem);
            margin-bottom: 5px;
            color: #aaa;
            font-weight: 300;
            height: 1.2em;
        }

        /* 修正: 数字の幅を固定してガタつきを防止 */
        #time-display {
            font-size: clamp(4.5rem, 18vw, 9rem);
            font-weight: 100;
            margin-bottom: 20px;
            font-variant-numeric: tabular-nums;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        #main-btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            width: 140px;
        }

        /* 戻るボタンのデザイン */
        #prev-btn {
            background: #333;
            padding: 15px 25px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            color: white;
        }

        .btn-start { background: var(--primary-color); }
        .btn-stop { background: var(--stop-color); }

        .settings-trigger {
            margin-top: 30px;
            background: none; border: none; cursor: pointer;
        }
        .settings-trigger svg { fill: #444; width: 36px; height: 36px; }

        .settings-panel {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98);
            z-index: 100;
            overflow-y: auto;
            padding: 20px;
            box-sizing: border-box;
        }
        .settings-panel.open { display: block; }

        .wait-setting {
            text-align: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 20px;
        }

        .picker-container {
            position: relative; height: 150px; width: 100px; margin: 10px auto;
            overflow-y: scroll; scroll-snap-type: y mandatory;
            mask-image: linear-gradient(0deg, transparent, black 40%, black 60%, transparent);
            -webkit-mask-image: linear-gradient(0deg, transparent, black 40%, black 60%, transparent);
        }
        .picker-container::-webkit-scrollbar { display: none; }
        .picker-list { padding: 50px 0; }
        .picker-item {
            height: 50px; display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; scroll-snap-align: center; color: #444;
        }
        .picker-item.selected { color: var(--accent-color); font-size: 2.2rem; font-weight: bold; }

        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; max-width: 400px; margin: 0 auto 20px auto;}
        input, select {
            background: #111; border: 1px solid #333; color: white; padding: 12px; border-radius: 8px; font-size: 1rem;
        }

        .list-item {
            display: flex; align-items: center; background: #111; margin-bottom: 8px;
            padding: 12px; border-radius: 8px; cursor: grab; max-width: 400px; margin: 0 auto 8px auto;
        }
        .item-info { flex-grow: 1; margin-left: 10px; }
        .remove-btn { color: var(--stop-color); border: none; background: none; font-size: 1.2rem; cursor: pointer; }
    /* スライダー（バー）の見た目 */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: #333;
            border-radius: 2px;
            outline: none;
        }
        /* スライダーのつまみ（丸い点） */
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: var(--primary-color);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(46, 204, 113, 0.4);
        }
    </style>
</head>
<body>

<div class="timer-container">
    <svg class="timer-svg" viewBox="0 0 400 400">
        <circle class="timer-bg" cx="200" cy="200" r="190"></circle>
        <circle id="progress-bar" class="timer-bar" cx="200" cy="200" r="190"></circle>
    </svg>
    <div class="inner-ui">
        <h1 id="current-title">Ready</h1>
        <div id="time-display">0.0</div>
        <div class="controls">
            <button id="prev-btn">PREV</button>
            <button id="main-btn" class="btn-start">START</button>
        </div>
    </div>
</div>

<button class="settings-trigger" id="open-settings">
    <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
</button>

<div class="settings-panel" id="panel">
    <div style="max-width: 450px; margin: 0 auto;">
        <h2 style="text-align:center;">MENU</h2>
        
        <div class="wait-setting">
    <p style="color: #666; font-size: 0.8rem; margin-bottom: 15px; letter-spacing: 2px;">INTERVAL TIME</p>
    <div style="display: flex; align-items: center; justify-content: center; gap: 20px;">
        <input type="range" id="wait-sec-input" min="0" max="30">
        <div style="min-width: 50px; text-align: left;">
            <span id="wait-val-display" style="font-size: 1.8rem; font-weight: 200; color: var(--primary-color); font-variant-numeric: tabular-nums;">5</span><span style="font-size: 0.8rem; color: #666; margin-left: 2px;">s</span>
        </div>
    </div>
</div>
        <div class="input-group">
            <input type="text" id="new-name" placeholder="種目名">
            <select id="side-type">
                <option value="both">1セット (両方)</option>
                <option value="single">2セット (左右交互)</option>
            </select>
            <button id="add-btn" style="background: var(--accent-color); color: white; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">追加</button>
        </div>
        <div id="item-list"></div>
        <button id="close-settings" style="width: 100%; padding: 15px; margin-top: 20px; background: #333; color: white; border: none; border-radius: 8px; cursor: pointer;">閉じる</button>
    </div>
</div>

<script>
    // --- 状態管理 ---
    let rawStretches = JSON.parse(localStorage.getItem('stretch_data')) || [{ name: "ハム", time: 30, type: "both" }];
    let waitTime = parseInt(localStorage.getItem('wait_time')) || 5;
    let workoutQueue = [];
    let currentIndex = 0;
    let selectedSeconds = 30;
    let isRunning = false;
    let isWaiting = false; 
    let startTime, elapsedTime = 0, requestID;

    const circle = document.getElementById('progress-bar');
    const radius = circle.r.baseVal.value;
    const circumference = 2 * Math.PI * radius;
    circle.style.strokeDasharray = `${circumference} ${circumference}`;

    // --- ピッカー初期化 (1秒刻み・sなし) ---
    const picker = document.getElementById('picker');
    const pickerList = document.getElementById('picker-list');
    for (let i = 1; i <= 300; i++) {
        const item = document.createElement('div');
        item.className = 'picker-item';
        item.innerText = i;
        item.dataset.sec = i;
        pickerList.appendChild(item);
    }
    picker.onscroll = () => {
        const items = document.querySelectorAll('.picker-item');
        const center = picker.getBoundingClientRect().top + picker.clientHeight / 2;
        items.forEach(item => {
            const itemCenter = item.getBoundingClientRect().top + item.clientHeight / 2;
            if (Math.abs(center - itemCenter) < 25) {
                items.forEach(i => i.classList.remove('selected'));
                item.classList.add('selected');
                selectedSeconds = parseInt(item.dataset.sec);
            }
        });
    };
    setTimeout(() => picker.scrollTop = (30 - 1) * 50, 100);

    function buildQueue() {
        workoutQueue = [];
        rawStretches.forEach(s => {
            if (s.type === "single") {
                workoutQueue.push({ name: s.name + " (左)", time: s.time });
                workoutQueue.push({ name: s.name + " (右)", time: s.time });
            } else {
                workoutQueue.push({ name: s.name, time: s.time });
            }
        });
    }

    function updateUI() {
        if (workoutQueue.length === 0) return;
        const current = workoutQueue[currentIndex];
        document.getElementById('current-title').innerText = isWaiting ? "NEXT: " + current.name : current.name;
        circle.style.stroke = isWaiting ? "var(--wait-color)" : "var(--primary-color)";
        
        const total = isWaiting ? waitTime * 1000 : current.time * 1000;
        const displayTime = Math.max(0, (total - elapsedTime) / 1000);
        document.getElementById('time-display').innerText = displayTime.toFixed(1);
        circle.style.strokeDashoffset = circumference - ((displayTime * 1000 / total) * circumference);
    }

    function animate(timestamp) {
        if (!startTime) startTime = timestamp;
        const currentDelta = timestamp - startTime + elapsedTime;
        const totalLimit = (isWaiting ? waitTime : workoutQueue[currentIndex].time) * 1000;

        const remaining = Math.max(0, totalLimit - currentDelta);
        document.getElementById('time-display').innerText = (remaining / 1000).toFixed(1);
        circle.style.strokeDashoffset = circumference - ((remaining / totalLimit) * circumference);

        if (remaining > 0) {
            requestID = requestAnimationFrame(animate);
        } else {
            if (isWaiting) {
                isWaiting = false;
                startStep();
            } else {
                nextStep();
            }
        }
    }

    function startStep() {
        cancelAnimationFrame(requestID);
        elapsedTime = 0; startTime = null;
        updateUI();
        if (isRunning) requestID = requestAnimationFrame(animate);
    }

    function nextStep() {
        cancelAnimationFrame(requestID);
        elapsedTime = 0; startTime = null;
        currentIndex++;
        if (currentIndex < workoutQueue.length) {
            isWaiting = waitTime > 0;
            startStep();
        } else {
            finishWorkout();
        }
    }

    function prevStep() {
        cancelAnimationFrame(requestID);
        elapsedTime = 0; startTime = null;
        isWaiting = false;
        if (currentIndex > 0) currentIndex--;
        updateUI();
        if (isRunning) requestID = requestAnimationFrame(animate);
    }

    function finishWorkout() {
        isRunning = false; isWaiting = false; currentIndex = 0;
        const btn = document.getElementById('main-btn');
        btn.innerText = "START"; btn.className = "btn-start";
        document.getElementById('current-title').innerText = "FINISH!";
        circle.style.strokeDashoffset = 0;
        circle.style.stroke = "var(--primary-color)";
    }

    function toggleTimer() {
        const btn = document.getElementById('main-btn');
        if (!isRunning) {
            isRunning = true;
            btn.innerText = "STOP"; btn.className = "btn-stop";
            startTime = null;
            requestID = requestAnimationFrame(animate);
        } else {
            isRunning = false;
            btn.innerText = "START"; btn.className = "btn-start";
            cancelAnimationFrame(requestID);
            elapsedTime += (performance.now() - (startTime || performance.now()));
            startTime = null;
        }
    }

    function renderList() {
        const listDiv = document.getElementById('item-list');
        listDiv.innerHTML = '';
        rawStretches.forEach((s, i) => {
            const item = document.createElement('div');
            item.className = 'list-item';
            item.draggable = true;
            item.dataset.name = s.name; item.dataset.time = s.time; item.dataset.type = s.type;
            item.innerHTML = `<div class="handle">≡</div><div class="item-info"><strong>${s.name}</strong> (${s.time}秒)</div><button class="remove-btn">✕</button>`;
            item.querySelector('.remove-btn').onclick = () => { rawStretches.splice(i, 1); renderList(); };
            item.addEventListener('dragstart', () => item.classList.add('dragging'));
            item.addEventListener('dragend', () => {
                item.classList.remove('dragging');
                const items = [...document.querySelectorAll('.list-item')];
                rawStretches = items.map(el => ({ name: el.dataset.name, time: parseInt(el.dataset.time), type: el.dataset.type }));
                renderList();
            });
            listDiv.appendChild(item);
        });
        localStorage.setItem('stretch_data', JSON.stringify(rawStretches));
        buildQueue();
        if (!isRunning) updateUI();
    }

    // イベント
    document.getElementById('new-name').onkeypress = (e) => { if (e.key === 'Enter') document.getElementById('add-btn').click(); };
    document.getElementById('add-btn').onclick = () => {
        const nameInput = document.getElementById('new-name');
        if (nameInput.value) {
            rawStretches.push({ name: nameInput.value, time: selectedSeconds, type: document.getElementById('side-type').value });
            nameInput.value = ''; renderList();
        }
    };
  // --- 修正版：エラーを回避する書き方 ---
    const waitInput = document.getElementById('wait-sec-input');
    const waitDisplay = document.getElementById('wait-val-display');

    // スライダーが存在する場合のみ処理を実行する（エラー回避ガード）
    if (waitInput && waitDisplay) {
        waitInput.oninput = (e) => {
            const val = e.target.value;
            waitDisplay.innerText = val;
            waitTime = parseInt(val) || 0;
            localStorage.setItem('wait_time', waitTime);
        };
        // 初期値をセット
        waitInput.value = waitTime;
        waitDisplay.innerText = waitTime;
    }

    // 設定画面を開く・閉じるボタンの処理
    const openBtn = document.getElementById('open-settings');
    const closeBtn = document.getElementById('close-settings');
    const panel = document.getElementById('panel');

    if (openBtn && panel) {
        openBtn.onclick = () => panel.classList.add('open');
    }
    if (closeBtn && panel) {
        closeBtn.onclick = () => panel.classList.remove('open');
    }

    // メインボタンと戻るボタン
    const mainBtn = document.getElementById('main-btn');
    const prevBtn = document.getElementById('prev-btn');
    if (mainBtn) mainBtn.onclick = toggleTimer;
    if (prevBtn) prevBtn.onclick = prevStep;

    renderList();
</script>
</body>
</html>
